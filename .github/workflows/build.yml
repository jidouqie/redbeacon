name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.1)"
        required: true
        default: "v1.0.0"

jobs:
  build-mac:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build
        run: python build.py

      - name: Zip dist (into workspace)
        run: |
          DIST_DIR="$(cd .. && pwd)/redbeacon-dist/mac"
          zip -r "$GITHUB_WORKSPACE/redbeacon-mac.zip" "$DIST_DIR" \
            --exclude "*/logs/*" \
            --exclude "*/data/redbeacon.db" \
            --exclude "*/data/cookies*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: redbeacon-mac
          path: redbeacon-mac.zip
          retention-days: 1

  build-win:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build
        run: python build.py

      - name: Zip dist (into workspace)
        shell: pwsh
        run: |
          $distPath = Join-Path (Split-Path $env:GITHUB_WORKSPACE -Parent) "redbeacon-dist\win"
          $zipPath = Join-Path $env:GITHUB_WORKSPACE "redbeacon-win.zip"
          Compress-Archive -Path $distPath -DestinationPath $zipPath

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: redbeacon-win
          path: redbeacon-win.zip
          retention-days: 1

  release:
    name: Create Release
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download mac artifact
        uses: actions/download-artifact@v4
        with:
          name: redbeacon-mac

      - name: Download win artifact
        uses: actions/download-artifact@v4
        with:
          name: redbeacon-win

      - name: Get tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Rename zips with version
        run: |
          TAG=${{ steps.tag.outputs.name }}
          mv redbeacon-mac.zip RedBeacon-mac-${TAG}.zip
          mv redbeacon-win.zip RedBeacon-win-${TAG}.zip

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: "RedBeacon ${{ steps.tag.outputs.name }}"
          body: |
            ## 下载

            > 解压后直接双击启动，无需安装任何环境。

            | 文件 | 平台 | 启动方式 |
            |---|---|---|
            | `RedBeacon-mac-*.zip` | macOS（Apple Silicon）| 解压 → 双击 `mac/RedBeacon.app` |
            | `RedBeacon-win-*.zip` | Windows x64 | 解压 → 双击 `win\RedBeacon.exe` |

            ## 使用前提

            - [Claude Code](https://claude.ai/download)（免费版即可）
            - AI API Key（兼容 OpenAI 格式）

            详细说明见 [README](https://github.com/jidouqie/redbeacon#readme)
          files: |
            RedBeacon-mac-*.zip
            RedBeacon-win-*.zip
          draft: false
          prerelease: false
